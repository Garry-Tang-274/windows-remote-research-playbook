name: Restore complete bilingual repository

on:
  push:
    paths:
      - .github/workflows/bootstrap.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore project files
        shell: bash
        run: |
          cat .bootstrap/payload.part* | base64 --decode > payload.zip
          unzip -oq payload.zip
          cp -a windows-remote-research-playbook/. .
          rm -rf windows-remote-research-playbook payload.zip .bootstrap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No repository changes were required."
            exit 0
          fi
          git commit -m "Add complete bilingual project files"
          git push
